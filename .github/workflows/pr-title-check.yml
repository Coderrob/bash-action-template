name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title-check:
    name: Validate PR Title Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR title format
        run: |
          ./scripts/validate_pr_title.sh "${{ github.event.pull_request.title }}"
