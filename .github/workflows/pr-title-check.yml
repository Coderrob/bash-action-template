name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title-check:
    name: Validate PR Title Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          # Expected format: [category][severity][case-id] Description
          # Examples:
          # [feat][major][ABC-123] Add new authentication system
          # [fix][minor][DEF-456] Resolve memory leak in utils.sh
          # [docs][patch][GHI-789] Update README with new examples

          # Check if title matches the pattern
          if [[ ! "$PR_TITLE" =~ ^\[([a-zA-Z]+)\]\[([a-zA-Z]+)\]\[([A-Z]+-[0-9]+)\]\ (.+)$ ]]; then
            echo "::error::PR title does not follow the required format"
            echo "::error::Expected format: [category][severity][case-id] Description"
            echo "::error::Examples:"
            echo "::error::  [feat][major][ABC-123] Add new authentication system"
            echo "::error::  [fix][minor][DEF-456] Resolve memory leak in utils.sh"
            echo "::error::  [docs][patch][GHI-789] Update README with new examples"
            echo "::error::"
            echo "::error::Valid categories: feat, fix, docs, style, refactor, test, chore, ci, perf, security"
            echo "::error::Valid severities: major, minor, patch"
            echo "::error::Valid case-id format: ABC-123 (letters followed by dash and numbers)"
            exit 1
          fi

          # Extract components for validation
          CATEGORY="${BASH_REMATCH[1]}"
          SEVERITY="${BASH_REMATCH[2]}"
          CASE_ID="${BASH_REMATCH[3]}"
          DESCRIPTION="${BASH_REMATCH[4]}"

          echo "Category: $CATEGORY"
          echo "Severity: $SEVERITY"
          echo "Case ID: $CASE_ID"
          echo "Description: $DESCRIPTION"

          # Validate category
          VALID_CATEGORIES=("feat" "fix" "docs" "style" "refactor" "test" "chore" "ci" "perf" "security")
          if [[ ! " ${VALID_CATEGORIES[*]} " =~ " ${CATEGORY} " ]]; then
            echo "::error::Invalid category '$CATEGORY'. Valid categories: ${VALID_CATEGORIES[*]}"
            exit 1
          fi

          # Validate severity
          VALID_SEVERITIES=("major" "minor" "patch")
          if [[ ! " ${VALID_SEVERITIES[*]} " =~ " ${SEVERITY} " ]]; then
            echo "::error::Invalid severity '$SEVERITY'. Valid severities: ${VALID_SEVERITIES[*]}"
            exit 1
          fi

          # Validate case-id format (already checked in regex, but double-check)
          if [[ ! "$CASE_ID" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "::error::Invalid case-id format '$CASE_ID'. Expected format: ABC-123"
            exit 1
          fi

          # Validate description is not empty
          if [[ -z "$DESCRIPTION" ]]; then
            echo "::error::Description cannot be empty"
            exit 1
          fi

          echo "::notice::PR title format is valid ✓"
