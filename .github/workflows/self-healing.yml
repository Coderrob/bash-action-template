name: Self-Healing

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if no changes detected"
        required: false
        default: false
        type: boolean
      license_header:
        description: "License header to add to source files"
        required: false
        default: "GPL-3.0-only"
        type: string
      license_holder:
        description: "Name of the license holder"
        required: false
        default: "Robert Lindley"
        type: string

jobs:
  self-heal:
    name: Self-Healing Automation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GitHub API rate limits
        uses: Coderrob/github-rate-limit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VS Code GitHub Actions snippets
        run: |
          echo "Checking for VS Code snippets updates..."
          bash scripts/update_snippets.sh

      - name: Add license headers to source files
        uses: Coderrob/add-copyright@main
        with:
          name: ${{ inputs.license_holder }}
          license: ${{ inputs.license_header }}
          working-directory: "scripts"

      - name: Check for changes
        id: check_changes
        run: |
          if [[ "${{ inputs.force_update }}" == "true" ]]; then
            ./scripts/check_changes.sh --force
          else
            ./scripts/check_changes.sh
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        uses: Coderrob/commit-and-push@v1
        with:
          commit-message: |
            🤖 Self-healing: Automated repository maintenance

            - Updated VS Code GitHub Actions snippets
            - Added license headers to source files
            - Performed routine maintenance tasks

            This commit was automatically generated by the self-healing workflow.
          branch: self-healing/${{ github.run_id }}
          create-branch: true
          open-pull-request: true
