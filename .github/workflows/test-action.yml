name: Test Action

on:
  workflow_dispatch:
    inputs:
      example_input:
        description: 'Example input value'
        required: false
        default: 'test-value'
        type: string
      log_level:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn
          - error

jobs:
  test-action:
    runs-on: ubuntu-latest
    name: Test Action
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Action with Default Inputs
        id: test-default
        uses: ./
        with:
          example_input: ${{ inputs.example_input || 'test-value' }}
          log_level: ${{ inputs.log_level || 'info' }}

      - name: Verify Default Output
        run: |
          echo "Action output: ${{ steps.test-default.outputs.example-output }}"
          if [[ "${{ steps.test-default.outputs.example-output }}" == "TEST-VALUE" ]]; then
            echo "✓ Default test passed"
          else
            echo "✗ Default test failed"
            exit 1
          fi

      - name: Test Action with Custom Inputs
        id: test-custom
        uses: ./
        with:
          example_input: 'custom-test-input'
          log_level: 'debug'

      - name: Verify Custom Output
        run: |
          echo "Action output: ${{ steps.test-custom.outputs.example-output }}"
          if [[ "${{ steps.test-custom.outputs.example-output }}" == "CUSTOM-TEST-INPUT" ]]; then
            echo "✓ Custom test passed"
          else
            echo "✗ Custom test failed"
            exit 1
          fi

  test-matrix:
    runs-on: ubuntu-latest
    name: Test Action Matrix
    strategy:
      matrix:
        include:
          - example_input: 'hello-world'
            log_level: 'debug'
            expected: 'HELLO-WORLD'
          - example_input: 'test_case'
            log_level: 'info'
            expected: 'TEST_CASE'
          - example_input: 'mixed-CASE-input'
            log_level: 'warn'
            expected: 'MIXED-CASE-INPUT'
          - example_input: ''
            log_level: 'error'
            expected: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Action Matrix
        id: test-matrix
        uses: ./
        with:
          example_input: ${{ matrix.example_input }}
          log_level: ${{ matrix.log_level }}

      - name: Verify Matrix Output
        run: |
          echo "Input: '${{ matrix.example_input }}' -> Output: '${{ steps.test-matrix.outputs.example-output }}' (Expected: '${{ matrix.expected }}')"
          if [[ "${{ steps.test-matrix.outputs.example-output }}" == "${{ matrix.expected }}" ]]; then
            echo "✓ Matrix test passed for input: ${{ matrix.example_input }}"
          else
            echo "✗ Matrix test failed for input: ${{ matrix.example_input }}"
            exit 1
          fi
